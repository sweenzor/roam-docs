name: Refresh docs from Roam

on:
  schedule:
    - cron: '23 5 * * *' # daily 05:23 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.53.0-noble
    steps:
      - uses: actions/checkout@v4

      - name: Export graphs + introspect API
        working-directory: scripts
        env:
          # Read-only roam-graph-tokens, one repo secret per graph; graphs.json
          # names the env var each graph reads ("tokenEnv"). Required — the
          # export runs over the official Backend API.
          ROAM_API_TOKEN_DEVELOPER_DOCUMENTATION: ${{ secrets.ROAM_API_TOKEN_DEVELOPER_DOCUMENTATION }}
          ROAM_API_TOKEN_HELP: ${{ secrets.ROAM_API_TOKEN_HELP }}
        run: |
          npm install --no-audit --no-fund --loglevel=error
          node export.mjs   # exports every graph in graphs.json
          node introspect.mjs

      - name: Generate site
        working-directory: scripts
        env:
          BASE_URL: ${{ vars.BASE_URL }} # optional; absolute links in llms.txt when set
        run: node generate.mjs

      - name: Commit & push if content changed
        id: commit
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add -A data public
          # Ignore diffs that are only the export timestamp lines.
          if git diff --cached --quiet -I'exportedAt' -I'Last export' -I'^> Exported'; then
            echo 'No content changes — skipping commit.'
          else
            git commit -m 'chore: refresh docs from Roam graphs'
            git push
            echo 'pushed=true' >> "$GITHUB_OUTPUT"
          fi

      - name: Ping IndexNow with changed pages
        if: steps.commit.outputs.pushed == 'true'
        run: |
          KEY=$(cat public/indexnow.txt)
          URLS=$(git diff --name-only HEAD~1 HEAD -- public | node -e "
            const files = require('fs').readFileSync(0, 'utf8').split('\n').filter(Boolean);
            const urls = files
              .filter((f) => f.endsWith('.html') && !f.endsWith('404.html'))
              .map((f) => 'https://roamdocs.fyi' + (f === 'public/index.html' ? '/' : f.replace(/^public/, '').replace(/\.html\$/, '')));
            console.log(JSON.stringify(urls));
          ")
          if [ "$URLS" = "[]" ]; then echo 'No HTML page changes — skipping IndexNow.'; exit 0; fi
          echo "Pinging IndexNow with $(echo "$URLS" | tr ',' '\n' | wc -l) URL(s)..."
          curl -sS -X POST https://api.indexnow.org/indexnow \
            -H 'Content-Type: application/json; charset=utf-8' \
            -d "{\"host\":\"roamdocs.fyi\",\"key\":\"$KEY\",\"keyLocation\":\"https://roamdocs.fyi/indexnow.txt\",\"urlList\":$URLS}" \
            -w '\nIndexNow HTTP %{http_code}\n'
